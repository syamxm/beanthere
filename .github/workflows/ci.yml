name: CI

on:
  push:
    branches-ignore: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 4 * * 1'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Lint all PHP files
        run: find public src scripts -name '*.php' -print0 | xargs -0 -n1 php -l

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  semgrep:
    runs-on: ubuntu-latest
    container: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4

      - name: Static analysis
        run: semgrep scan --config p/php --config p/security-audit --error --severity ERROR

  build:
    runs-on: ubuntu-latest
    needs: [lint, semgrep]
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t beanthere:ci .

  trivy:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - name: Scan repo config for misconfigurations
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: misconfig,secret
          severity: HIGH,CRITICAL
          exit-code: 1
          trivyignores: .trivyignore

      - name: Build image
        run: docker build -t beanthere:ci .

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: beanthere:ci
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1
          trivyignores: .trivyignore
