# Security headers for the app container. The site is fully self-hosted
# (Phase 3 removed all third-party origins), so default-src 'self' is enough.
# script-src/style-src keep 'unsafe-inline' because the app uses small
# per-page inline <script> blocks and inline style attributes — see README.
Header always set Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'"
Header always set X-Content-Type-Options "nosniff"
Header always set Referrer-Policy "strict-origin-when-cross-origin"
Header always set X-Frame-Options "DENY"
Header always set Permissions-Policy "camera=(), microphone=(), geolocation=()"
