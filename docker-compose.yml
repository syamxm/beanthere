services:
  app:
    build: .
    container_name: beanthere-app
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      DB_NAME: ${DB_NAME}
      OLLAMA_URL: ${OLLAMA_URL}
      OLLAMA_MODEL: ${OLLAMA_MODEL}
    volumes:
      - ./logs:/var/www/html/logs
      - menu_uploads:/var/www/html/public/assets/menu
    ports:
      - "127.0.0.1:8081:80"
    depends_on:
      - db
    networks:
      - internal
      - proxy-net

  db:
    image: mariadb:10.4
    container_name: beanthere-db
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASS}
      MARIADB_DATABASE: ${DB_NAME}
      MARIADB_USER: ${DB_USER}
      MARIADB_PASSWORD: ${DB_PASS}
    volumes:
      - dbdata:/var/lib/mysql
      - ./db:/docker-entrypoint-initdb.d:ro
    networks:
      - internal

volumes:
  dbdata:
  menu_uploads:

networks:
  # Fixed subnet so the firewall rule that lets the app reach Ollama on the
  # host (gateway 172.31.0.1) stays valid across recreates. See README.
  internal:
    ipam:
      config:
        - subnet: 172.31.0.0/16
  proxy-net:
    external: true
