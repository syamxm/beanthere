; Production PHP settings for the app container.
; Errors go to the container log (docker logs), never to the browser.
display_errors = Off
display_startup_errors = Off
log_errors = On
error_log = /dev/stderr
expose_php = Off

session.cookie_httponly = 1
session.cookie_samesite = Lax
session.use_strict_mode = 1

; SESSION_COOKIE_SECURE=1 turns on the Secure flag (HTTPS deployments).
; It stays off by default so local HTTP development keeps working.
auto_prepend_file = /var/www/html/src/session_cookie.php
